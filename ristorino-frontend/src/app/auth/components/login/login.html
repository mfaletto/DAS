<div class="login-container">
  <div class="login-card">
    <div class="text-center">
      <h2 class="login-title">Ristorino</h2>
      <p class="login-subtitle">Tu mesa, en un click.</p>
    </div>

    <div *ngIf="mensajeError" class="alert alert-danger text-center rounded-3">
      <small>{{ mensajeError }}</small>
    </div>

    <form (ngSubmit)="iniciarSesion()">
      <div class="mb-4">
        <input type="email" class="form-control" placeholder="Correo electrónico"
               [(ngModel)]="correo" name="correo" required>
      </div>
      <div class="mb-4">
        <input type="password" class="form-control" placeholder="Contraseña"
               [(ngModel)]="clave" name="clave" required>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-block">
          Ingresar
        </button>
      </div>
    </form>
    
    <div class="text-center mt-4">
      <small class="text-muted">¿Olvidaste tu contraseña?</small>
    </div>
  </div>
</div>
