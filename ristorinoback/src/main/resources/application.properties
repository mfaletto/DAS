# SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ristorinoDB;encrypt=true;trustServerCertificate=true;loginTimeout=5;socketTimeout=30000
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hikari: lÌmites sanos
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.initialization-fail-timeout=0

# Spring JDBC: cort· consultas colgadas
spring.jdbc.template.query-timeout=10

# Logs ˙tiles
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.com.microsoft.sqlserver.jdbc=INFO
