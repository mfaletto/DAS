<!-- src/app/components/layout/header/header.html -->
<mat-toolbar color="primary" class="ristorino-toolbar">
  
  <!-- Logo (Mockup: Ristorino Portal) -->
  <span class="portal-logo" routerLink="/home">Ristorino Portal</span>
  
  <span class="spacer"></span> 

  <!-- Menú de Navegación Principal -->
  <button mat-button routerLink="/home">Inicio</button>
  <button mat-button routerLink="/explorar">Explorar</button>
  <button mat-button routerLink="/reservas">Reservas</button>
  
  <!-- Icono de Idioma (Global) -->
  <button mat-icon-button class="language-button" aria-label="Cambiar Idioma">
    <mat-icon>language</mat-icon>
  </button>
  
  <!-- Botones de Autenticación (Mostrados en el mockup) -->
  <ng-container *ngIf="!isLoggedIn">
    <button mat-raised-button color="accent" routerLink="/registro">Registrarse</button>
    <button mat-button routerLink="/login">Iniciar Sesión</button>
  </ng-container>

  <!-- Simulación de perfil de usuario (cuando está logueado) -->
  <ng-container *ngIf="isLoggedIn">
    <button mat-button routerLink="/perfil">Perfil</button>
    <button mat-button color="warn">Cerrar Sesión</button>
  </ng-container>

</mat-toolbar>
